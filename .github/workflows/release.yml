# Cross-platform release builds: Windows (portable zip), macOS (dmg) and
# Linux (AppImage). Runs on each OS's native runner (Tauri links the OS-native
# webview and cannot cross-compile) and attaches the artifact to the GitHub
# release for the tag.
#
# Triggers on a v* tag push, or manually via workflow_dispatch with a tag input
# (build/attach an existing release without moving its tag). The bundled
# firmware/UF2/Adafruit assets are gitignored, so each job provisions them
# before building (a cross-platform port of tools/download-assets.ps1).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach (e.g. v0.4.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          # Pinned to macos-15 (Apple Silicon): macos-latest is migrating to
          # macOS 26. Note the artifact is aarch64-only; Intel Macs would need
          # a separate x86_64 build (e.g. macos-13) or a universal binary.
          - os: macos-15
            name: macos
          - os: ubuntu-22.04
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Tauri v2 Linux build deps, plus AppImage (linuxdeploy needs FUSE),
      # ALSA (alsa-sys, pulled in by the midir MIDI crate) and udev (serialport).
      - name: Linux build deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libfuse2 \
            libasound2-dev libudev-dev pkg-config

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: editor/src-tauri

      # The bundle assets (firmware tree, CircuitPython UF2, Adafruit libs) are
      # gitignored, so recreate them here. Single bash step for all three OSes
      # (every runner, including Windows, provides bash + curl + unzip).
      - name: Provision bundled resources
        shell: bash
        # Authenticate the api.github.com call below: unauthenticated requests
        # are rate-limited to 60/hour per IP, and shared macOS runner IPs hit
        # that ceiling intermittently (a 403 that failed past releases).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RES=editor/src-tauri/resources
          TMP=.assets_tmp
          rm -rf "$TMP" "$RES/firmware" "$RES/lib"; mkdir -p "$TMP" "$RES/lib"
          # 1. firmware tree
          cp -r firmware "$RES/firmware"
          find "$RES/firmware" -name __pycache__ -type d -prune -exec rm -rf {} + 2>/dev/null || true
          # 2. CircuitPython UF2 (matches tools/download-assets.ps1 default)
          curl -fL -o "$RES/circuitpython.uf2" \
            "https://downloads.circuitpython.org/bin/raspberry_pi_pico/en_US/adafruit-circuitpython-raspberry_pi_pico-en_US-9.2.7.uf2"
          # 3. Adafruit CircuitPython Bundle (9.x mpy) -> the four libs we import
          BURL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/adafruit/Adafruit_CircuitPython_Bundle/releases/latest \
            | grep -oE 'https://[^"]*adafruit-circuitpython-bundle-9\.x-mpy-[0-9]+\.zip' | head -1)
          curl -fL -o "$TMP/bundle.zip" "$BURL"
          unzip -q "$TMP/bundle.zip" -d "$TMP/bundle"
          BLIB=$(find "$TMP/bundle" -type d -name lib | head -1)
          cp -r "$BLIB/adafruit_display_text" "$RES/lib/"
          cp "$BLIB/adafruit_st7789.mpy" "$RES/lib/"
          cp "$BLIB/neopixel.mpy" "$RES/lib/"
          cp "$BLIB/adafruit_pixelbuf.mpy" "$RES/lib/"
          rm -rf "$TMP"
          echo "resources:"; ls -la "$RES"; echo "lib:"; ls -la "$RES/lib"

      - name: Install node deps
        working-directory: editor
        run: npm install --no-audit --no-fund

      # Windows keeps the project's portable (no-installer) format.
      - name: Build - Windows portable zip
        if: matrix.name == 'windows'
        shell: pwsh
        working-directory: editor
        run: npm run package:portable

      - name: Build - macOS dmg
        if: matrix.name == 'macos'
        working-directory: editor
        run: npx tauri build --bundles dmg

      - name: Build - Linux AppImage
        if: matrix.name == 'linux'
        working-directory: editor
        run: npx tauri build --bundles appimage

      - name: Locate artifact
        id: art
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.name }}" in
            windows) f=$(ls dist/Bosun-*-portable-x64.zip | head -1) ;;
            macos)   f=$(ls editor/src-tauri/target/release/bundle/dmg/*.dmg | head -1) ;;
            linux)   f=$(ls editor/src-tauri/target/release/bundle/appimage/*.AppImage | head -1) ;;
          esac
          echo "file=$f" >> "$GITHUB_OUTPUT"
          echo "artifact -> $f"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: Bosun ${{ github.ref_name }}
          files: ${{ steps.art.outputs.file }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653 cmdline-tools;latest"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: editor/src-tauri

      - name: Install node deps
        working-directory: editor
        run: npm install --no-audit --no-fund

      - name: Provision bundled firmware resources
        shell: bash
        run: |
          set -euo pipefail
          RES=editor/src-tauri/resources
          mkdir -p "$RES/firmware" "$RES/lib"
          cp -r firmware "$RES/firmware"
          find "$RES/firmware" -name __pycache__ -type d -prune -exec rm -rf {} + 2>/dev/null || true
          curl -fL -o "$RES/circuitpython.uf2" \
            "https://downloads.circuitpython.org/bin/raspberry_pi_pico/en_US/adafruit-circuitpython-raspberry_pi_pico-en_US-9.2.7.uf2"

      - name: Init Android project
        working-directory: editor
        run: npx tauri android init

      - name: Build Android APK (debug)
        working-directory: editor
        run: npx tauri android build --apk --debug
        continue-on-error: true

      - name: Build Android APK (release, unsigned)
        working-directory: editor
        run: npx tauri android build --apk
        continue-on-error: true

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: editor/src-tauri/gen/android/app/build/outputs/apk/universal/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        continue-on-error: true

      - name: Prepare APK for release
        shell: bash
        run: |
          mkdir -p release
          # Prefer signed universal release, then unsigned release, then debug
          if [ -f editor/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned-signed.apk ]; then
            cp editor/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned-signed.apk release/bosun.apk
            echo "Using signed release APK"
          elif [ -f editor/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk ]; then
            cp editor/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk release/bosun.apk
            echo "Using unsigned release APK"
          else
            # Fall back to arm64 debug APK
            cp editor/src-tauri/gen/android/app/build/outputs/apk/arm64/debug/app-arm64-debug.apk release/bosun.apk 2>/dev/null || \
            cp $(find editor/src-tauri/gen/android -name "*.apk" -path "*/debug/*" | head -1) release/bosun.apk
            echo "Using debug APK (installable, for testing)"
          fi
          echo "APK ready: $(ls -lh release/bosun.apk)"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          name: Bosun ${{ github.ref_name }}
          files: release/bosun.apk
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
