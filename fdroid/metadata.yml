AutoName: Bosun
Summary: Configure MIDI Captain pedals from your phone

Description: |
  Bosun is an editor for the PaintAudio MIDI Captain pedal. Connect your
  pedal to your Android phone via USB-OTG and edit every aspect of your
  MIDI foot controller on the go.

  Features include patch and binding editing (tap, latched, momentary,
  long-press, double-tap modes with multi-message chains), LED colour
  configuration, TFT screen layout editor, MIDI Learn table, expression
  pedal calibration, profile management, and setlist view.

  Works with plugins for Kemper Player, Hotone Ampero II Stage, Line 6
  Helix, and generic MIDI devices. No internet connection required.

