AutoName: Bosun
Summary: Configure MIDI Captain pedals from your phone

Description: |
  Bosun is an editor for the PaintAudio MIDI Captain pedal. Connect your
  pedal to your Android phone via USB-OTG and edit every aspect of your
  MIDI foot controller on the go.

  Features:
  - Edit patches and bindings: tap, latched, momentary, long-press,
    double-tap modes with multi-message chains
  - Data-driven UI adapts to any plugin (Kemper Player, Ampero II Stage,
    Line 6 Helix, generic MIDI)
  - LED colour configuration per switch, per state
  - TFT screen layout editor
  - MIDI Learn table
  - Expression pedal calibration and assignment
  - Profile management
  - Setlist view for gig organization
  - Works entirely offline with the pedal over USB

